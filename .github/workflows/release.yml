name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${TAG_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Get previous tag to calculate build number
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            BUILD_NUM=1
          else
            PREV_BUILD=$(git rev-list --count "$PREV_TAG..HEAD" 2>/dev/null || echo "1")
            BUILD_NUM=$((PREV_BUILD + 1))
          fi
          echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV

          # Build release notes from git log
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG=$(git log --oneline -20)
          else
            CHANGELOG=$(git log --oneline "$PREV_TAG..HEAD")
          fi

          RELEASE_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          DMG_URL="https://github.com/Remper1997/MiniMaxUsage/releases/download/v${VERSION}/MiniMaxUsage.dmg"

          # Write complete appcast.xml from scratch using printf
          printf '<?xml version="1.0" encoding="UTF-8"?>\n' > appcast.xml
          printf '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">\n' >> appcast.xml
          printf '  <channel>\n' >> appcast.xml
          printf '    <title>MiniMaxUsage Updates</title>\n' >> appcast.xml
          printf '    <link>https://github.com/Remper1997/MiniMaxUsage/releases</link>\n' >> appcast.xml
          printf '    <description>MiniMaxUsage update feed</description>\n' >> appcast.xml
          printf '    <language>en</language>\n' >> appcast.xml
          printf '  <item>\n' >> appcast.xml
          printf '    <title>Version %s</title>\n' "$VERSION" >> appcast.xml
          printf '    <sparkle:version>%s</sparkle:version>\n' "$BUILD_NUM" >> appcast.xml
          printf '    <sparkle:shortVersionString>%s</sparkle:shortVersionString>\n' "$VERSION" >> appcast.xml
          printf '    <description><![CDATA[\n' >> appcast.xml
          printf '## MiniMaxUsage v%s\n\n' "$VERSION" >> appcast.xml
          printf 'Automated release built by GitHub Actions.\n\n' >> appcast.xml
          printf '### Changes in this release:\n' >> appcast.xml
          printf '%s\n' "$CHANGELOG" >> appcast.xml
          printf '    ]]></description>\n' >> appcast.xml
          printf '    <pubDate>%s</pubDate>\n' "$RELEASE_DATE" >> appcast.xml
          printf '    <enclosure url="%s" sparkle:version="%s" sparkle:shortVersionString="%s" type="application/octet-stream" />\n' "$DMG_URL" "$BUILD_NUM" "$VERSION" >> appcast.xml
          printf '  </item>\n' >> appcast.xml
          printf '  </channel>\n' >> appcast.xml
          printf '</rss>\n' >> appcast.xml

          echo "=== Updated appcast.xml ==="
          cat appcast.xml

          # Commit and push appcast.xml to main branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast.xml for v${VERSION}"
          git push origin main

      - name: Set version from tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${TAG_NAME#v}
          BUILD_NUM=${{ env.BUILD_NUM }}

          # Update CFBundleShortVersionString (display version)
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" MiniMaxUsage/Resources/Info.plist

          # Update CFBundleVersion (comparison version - must be numeric and incrementing)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" MiniMaxUsage/Resources/Info.plist

          echo "=== Updated Info.plist ==="
          echo "CFBundleShortVersionString: $VERSION"
          echo "CFBundleVersion: $BUILD_NUM"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release
        run: xcodebuild -project MiniMaxUsage.xcodeproj -scheme MiniMaxUsage -configuration Release build BUILD_OUTPUT_DIR=$(pwd)/build

      - name: Create DMG with Applications alias
        run: |
          mkdir -p dmg_root
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "MiniMaxUsage.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: App not found in DerivedData"
            exit 1
          fi
          cp -R "$APP_PATH" dmg_root/
          ln -s /Applications dmg_root/Applications
          hdiutil create MiniMaxUsage.dmg -volname "MiniMaxUsage" -srcfolder dmg_root -ov -format UDZO

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_DEV_ID: ${{ secrets.CERTIFICATE_DEV_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATE_DEV_ID" ]; then
            echo "No certificate configured, skipping sign"
            exit 0
          fi
          KEYCHAIN_PATH=/tmp/sign.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo -n "$CERTIFICATE_DEV_ID" | base64 --decode -o cert.p12
          security import cert.p12 -P "" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,sign: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          echo "=== Available identities ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          rm cert.p12

      - name: Sign DMG
        env:
          APP_SIGNING_IDENTITY: ${{ secrets.APP_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APP_SIGNING_IDENTITY" ]; then
            echo "No signing identity configured, skipping sign"
            exit 0
          fi
          codesign -s "$APP_SIGNING_IDENTITY" --force --deep MiniMaxUsage.dmg
          codesign -dv MiniMaxUsage.dmg

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${TAG_NAME#v}

          # Create release notes
          echo "## MiniMaxUsage v${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "Automated release built by GitHub Actions." >> release_notes.md

          # Create release with DMG
          gh release create "v${VERSION}" \
            --title "MiniMaxUsage v${VERSION}" \
            --notes-file release_notes.md \
            --repo ${{ github.repository }} \
            --latest \
            ./MiniMaxUsage.dmg
