name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release
        run: xcodebuild -project MiniMaxUsage.xcodeproj -scheme MiniMaxUsage -configuration Release build BUILD_OUTPUT_DIR=$(pwd)/build

      - name: Create DMG with Applications alias
        run: |
          mkdir -p dmg_root
          # Find the built app
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "MiniMaxUsage.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: App not found in DerivedData"
            exit 1
          fi
          cp -R "$APP_PATH" dmg_root/
          ln -s /Applications dmg_root/Applications
          hdiutil create MiniMaxUsage.dmg -volname "MiniMaxUsage" -srcfolder dmg_root -ov -format UDZO

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          # Delete existing release if exists (force recreate)
          if gh release view v${{ github.ref_name }} --repo ${{ github.repository }} 2>/dev/null; then
            echo "Deleting existing release..."
            gh release delete v${{ github.ref_name }} --yes --repo ${{ github.repository }}
          fi
          # Create new release with DMG
          gh release create v${{ github.ref_name }} --title "Release ${{ github.ref_name }}" --notes "Automatic release built by GitHub Actions" --repo ${{ github.repository }} ./MiniMaxUsage.dmg