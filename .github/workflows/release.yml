name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Update appcast.xml
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${TAG_NAME#v}
          echo "VERSION=$VERSION" >> $GITHUB_ENV

          # Get previous tag to calculate build number
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')
          if [ -z "$PREV_TAG" ]; then
            BUILD_NUM=1
          else
            PREV_BUILD=$(git rev-list --count "$PREV_TAG..HEAD" 2>/dev/null || echo "1")
            BUILD_NUM=$((PREV_BUILD + 1))
          fi
          echo "BUILD_NUM=$BUILD_NUM" >> $GITHUB_ENV

          # Get previous tag (second most recent)
          PREV_TAG=$(git tag --sort=-v:refname | sed -n '2p')

          # Generate release notes
          echo "## MiniMaxUsage v${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "Automated release built by GitHub Actions." >> release_notes.md
          echo "" >> release_notes.md
          echo "### Changes in this release:" >> release_notes.md

          if [ -z "$PREV_TAG" ]; then
            git log --oneline -20 >> release_notes.md
          else
            git log --oneline "$PREV_TAG..HEAD" >> release_notes.md
          fi

          # Create new appcast item XML
          RELEASE_DATE=$(date -u +"%a, %d %b %Y %H:%M:%S +0000")
          DMG_URL="https://github.com/Remper1997/MiniMaxUsage/releases/download/v${VERSION}/MiniMaxUsage.dmg"

          NEW_ITEM="  <item>\n    <title>Version ${VERSION}</title>\n    <sparkle:version>${BUILD_NUM}</sparkle:version>\n    <sparkle:shortVersionString>${VERSION}</sparkle:shortVersionString>\n    <description><![CDATA[\n$(cat release_notes.md)\n    ]]></description>\n    <pubDate>${RELEASE_DATE}</pubDate>\n    <enclosure url=\"${DMG_URL}\" sparkle:version=\"${BUILD_NUM}\" sparkle:shortVersionString=\"${VERSION}\" type=\"application/octet-stream\" />\n  </item>"

          # Update appcast.xml - insert new item after channel opening tags
          if [ -f appcast.xml ]; then
            # Remove closing tags, insert new item, add closing tags
            sed -i '' 's|</channel>|'"${NEW_ITEM}"'\n</channel>|' appcast.xml
          else
            # Create new appcast.xml
            printf '%s\n' '<?xml version="1.0" encoding="UTF-8"?>' \
              '<rss version="2.0" xmlns:sparkle="http://www.andymatuschak.org/xml-namespaces/sparkle">' \
              '  <channel>' \
              '    <title>MiniMaxUsage Updates</title>' \
              '    <link>https://github.com/Remper1997/MiniMaxUsage/releases</link>' \
              '    <description>MiniMaxUsage update feed</description>' \
              '    <language>en</language>' > appcast.xml
            printf '%s\n' "${NEW_ITEM}" >> appcast.xml
            printf '%s\n' '  </channel>' '</rss>' >> appcast.xml
          fi

          echo "=== Updated appcast.xml ==="
          cat appcast.xml

          # Commit and push appcast.xml to main branch
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add appcast.xml
          git commit -m "Update appcast.xml for v${VERSION}"
          git push origin main

      - name: Set version from tag
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${TAG_NAME#v}
          BUILD_NUM=${{ env.BUILD_NUM }}

          # Update CFBundleShortVersionString (display version)
          /usr/libexec/PlistBuddy -c "Set :CFBundleShortVersionString $VERSION" MiniMaxUsage/Resources/Info.plist

          # Update CFBundleVersion (comparison version - must be numeric and incrementing)
          /usr/libexec/PlistBuddy -c "Set :CFBundleVersion $BUILD_NUM" MiniMaxUsage/Resources/Info.plist

          echo "=== Updated Info.plist ==="
          echo "CFBundleShortVersionString: $VERSION"
          echo "CFBundleVersion: $BUILD_NUM"

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release
        run: xcodebuild -project MiniMaxUsage.xcodeproj -scheme MiniMaxUsage -configuration Release build BUILD_OUTPUT_DIR=$(pwd)/build

      - name: Create DMG with Applications alias
        run: |
          mkdir -p dmg_root
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "MiniMaxUsage.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: App not found in DerivedData"
            exit 1
          fi
          cp -R "$APP_PATH" dmg_root/
          ln -s /Applications dmg_root/Applications
          hdiutil create MiniMaxUsage.dmg -volname "MiniMaxUsage" -srcfolder dmg_root -ov -format UDZO

      - name: Import Code Signing Certificate
        env:
          CERTIFICATE_DEV_ID: ${{ secrets.CERTIFICATE_DEV_ID }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          if [ -z "$CERTIFICATE_DEV_ID" ]; then
            echo "No certificate configured, skipping sign"
            exit 0
          fi
          KEYCHAIN_PATH=/tmp/sign.keychain-db
          security create-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security set-keychain-settings -lut 21600 $KEYCHAIN_PATH
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          echo -n "$CERTIFICATE_DEV_ID" | base64 --decode -o cert.p12
          security import cert.p12 -P "" -A -t cert -f pkcs12 -k $KEYCHAIN_PATH
          security set-key-partition-list -S apple-tool:,apple:,sign: -k "$KEYCHAIN_PASSWORD" $KEYCHAIN_PATH
          security list-keychains -d user -s $KEYCHAIN_PATH
          echo "=== Available identities ==="
          security find-identity -v -p codesigning $KEYCHAIN_PATH
          rm cert.p12

      - name: Sign DMG
        env:
          APP_SIGNING_IDENTITY: ${{ secrets.APP_SIGNING_IDENTITY }}
        run: |
          if [ -z "$APP_SIGNING_IDENTITY" ]; then
            echo "No signing identity configured, skipping sign"
            exit 0
          fi
          codesign -s "$APP_SIGNING_IDENTITY" --force --deep MiniMaxUsage.dmg
          codesign -dv MiniMaxUsage.dmg

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          VERSION=${TAG_NAME#v}

          # Create release notes
          echo "## MiniMaxUsage v${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "Automated release built by GitHub Actions." >> release_notes.md

          # Create release with DMG
          gh release create "v${VERSION}" \
            --title "MiniMaxUsage v${VERSION}" \
            --notes-file release_notes.md \
            --repo ${{ github.repository }} \
            --latest \
            ./MiniMaxUsage.dmg
