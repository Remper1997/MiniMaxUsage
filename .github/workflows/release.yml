name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set Node.js to 24
        run: echo "FORCE_JAVASCRIPT_ACTIONS_TO_NODE24=true" >> $GITHUB_ENV

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Build release
        run: xcodebuild -project MiniMaxUsage.xcodeproj -scheme MiniMaxUsage -configuration Release build BUILD_OUTPUT_DIR=$(pwd)/build

      - name: Create DMG with Applications alias
        run: |
          mkdir -p dmg_root
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "MiniMaxUsage.app" -type d 2>/dev/null | head -1)
          if [ -z "$APP_PATH" ]; then
            echo "Error: App not found in DerivedData"
            exit 1
          fi
          cp -R "$APP_PATH" dmg_root/
          ln -s /Applications dmg_root/Applications
          hdiutil create MiniMaxUsage.dmg -volname "MiniMaxUsage" -srcfolder dmg_root -ov -format UDZO

      - name: Upload DMG to release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG_NAME: ${{ github.ref_name }}
        run: |
          # Get version without 'v' prefix for title
          VERSION=${TAG_NAME#v}

          # Generate release notes
          echo "## MiniMaxUsage v${VERSION}" > release_notes.md
          echo "" >> release_notes.md
          echo "Automated release built by GitHub Actions." >> release_notes.md
          echo "" >> release_notes.md
          echo "### Changes in this release:" >> release_notes.md
          git log --oneline -10 >> release_notes.md

          # Create new release with DMG and release notes
          gh release create "v${VERSION}" \
            --title "MiniMaxUsage v${VERSION}" \
            --notes release_notes.md \
            --repo ${{ github.repository }} \
            --latest \
            ./MiniMaxUsage.dmg