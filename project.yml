name: MiniMaxUsage
options:
  bundleIdPrefix: com.minimaxusage
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    PRODUCT_NAME: MiniMaxUsage

targets:
  MiniMaxUsage:
    type: application
    platform: macOS
    sources:
      - path: MiniMaxUsage/Sources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.minimaxusage.MiniMaxUsage
        INFOPLIST_FILE: MiniMaxUsage/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: MiniMaxUsage/Resources/MiniMaxUsage.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: MiniMaxUsage/Resources/MiniMaxUsage.entitlements