name: MacAiUse
options:
  bundleIdPrefix: com.freememory
  deploymentTarget:
    macOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGN_STYLE: Manual
    PRODUCT_NAME: MacAiUse

targets:
  MacAiUse:
    type: application
    platform: macOS
    sources:
      - path: MacAiUse/Sources
        type: group
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.freememory.MacAiUse
        INFOPLIST_FILE: MacAiUse/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: MacAiUse/Resources/MacAiUse.entitlements
        LD_RUNPATH_SEARCH_PATHS: "@executable_path/../Frameworks"
        COMBINE_HIDPI_IMAGES: true
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    entitlements:
      path: MacAiUse/Resources/MacAiUse.entitlements